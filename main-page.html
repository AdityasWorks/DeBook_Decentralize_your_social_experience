<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./main-page.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap"
    />
  </head>
  <body>
    <div class="desktop-2">
      <img class="desktop-2-child" alt="" src="./ellipse 2.png" />

      <img class="desktop-2-item" alt="" src="./rectangle 2.png" />

      <div class="rectangle-parent">
        <img class="frame-child" alt="" src="./rectangle 1.png" />

        <img
          class="frame-item"
          loading="lazy"
          alt=""
          src="./ellipse 4.png"
        />
      </div>
      <div class="profile-image">
        <div class="vector-parent">
          <img class="frame-inner" alt="" src="./ellipse 1.png" />

          <div class="button-label">
            <div class="profile-parent">
              <h1 class="profile">PROFILE</h1>
              <div class="cc175b9c0f1b6a831c399e26977266">
                0cc175b9c0f1b6a831c399e269772661
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="share-image-btn">
        <img
          class="share-image-btn-child"
          alt=""
          src="./ellipse 1.png"
        />

        <div class="share-image-btn-inner">
          <img
            class="rectangle-icon"
            alt=""
            src="./rectangle 1.png"
          />
        </div>
        <button class="rectangle-group">
          <div class="rectangle-div"></div>
          <b class="share-image">SHARE IMAGE</b>
        </button>
      </div>
    </div>
  </body>
</html>
